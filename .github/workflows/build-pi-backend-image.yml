name: Build Raspberry Pi backend image

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/build-pi-backend-image.yml"
      - "backend/**"
      - "pi-image/**"

jobs:
  build:
    name: Build backend image
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free runner disk space
        run: |
          set -euo pipefail
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android || true
          df -h

      - name: Install image customization tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            curl jq xz-utils zip util-linux parted e2fsprogs dosfstools file openssl

      - name: Download latest Raspberry Pi OS Lite 64-bit image
        run: |
          set -euo pipefail
          mkdir -p build/pi-image

          curl -fsSL \
            https://downloads.raspberrypi.com/os_list_imagingutility_v4.json \
            -o build/pi-image/os-list.json

          IMAGE_URL="$(jq -r '
            def nodes:
              . as $item
              | $item,
                ($item.subitems[]? | nodes);
            .os_list[]
            | nodes
            | select(.name == "Raspberry Pi OS Lite (64-bit)")
            | .url
          ' build/pi-image/os-list.json | head -n 1)"

          IMAGE_SHA256="$(jq -r '
            def nodes:
              . as $item
              | $item,
                ($item.subitems[]? | nodes);
            .os_list[]
            | nodes
            | select(.name == "Raspberry Pi OS Lite (64-bit)")
            | .extract_sha256
          ' build/pi-image/os-list.json | head -n 1)"

          if [ -z "${IMAGE_URL}" ] || [ "${IMAGE_URL}" = "null" ]; then
            echo "Could not find Raspberry Pi OS Lite (64-bit) in Raspberry Pi Imager OS list."
            exit 1
          fi

          echo "Downloading ${IMAGE_URL}"
          curl -fL --retry 5 --retry-delay 10 \
            -o build/pi-image/raspios-lite-arm64.img.xz \
            "${IMAGE_URL}"

          xz -T0 -dk build/pi-image/raspios-lite-arm64.img.xz

          if [ -n "${IMAGE_SHA256}" ] && [ "${IMAGE_SHA256}" != "null" ]; then
            echo "${IMAGE_SHA256}  build/pi-image/raspios-lite-arm64.img" | sha256sum -c -
          fi

      - name: Prepare backend config
        env:
          BROADCASTIFY_API_KEY: ${{ secrets.BROADCASTIFY_API_KEY }}
          RADIOREFERENCE_API_KEY: ${{ secrets.RADIOREFERENCE_API_KEY }}
          RADIOREFERENCE_USERNAME: ${{ secrets.RADIOREFERENCE_USERNAME }}
          RADIOREFERENCE_PASSWORD: ${{ secrets.RADIOREFERENCE_PASSWORD }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          BACKEND_ADMIN_TOKEN: ${{ secrets.BACKEND_ADMIN_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${BROADCASTIFY_API_KEY}" ]; then
            echo "Missing required GitHub secret: BROADCASTIFY_API_KEY"
            exit 1
          fi

          RR_API_KEY="${RADIOREFERENCE_API_KEY:-${BROADCASTIFY_API_KEY:-}}"
          ADMIN_TOKEN="${BACKEND_ADMIN_TOKEN:-}"
          export RR_API_KEY ADMIN_TOKEN

          mkdir -p build/pi-image/config
          python3 - <<'PY'
          import os
          from pathlib import Path

          replacements = {
              "BROADCASTIFY_API_KEY": os.environ["BROADCASTIFY_API_KEY"],
              "RADIOREFERENCE_API_KEY": os.environ["RR_API_KEY"],
              "RADIOREFERENCE_USERNAME": os.environ.get("RADIOREFERENCE_USERNAME", ""),
              "RADIOREFERENCE_PASSWORD": os.environ.get("RADIOREFERENCE_PASSWORD", ""),
              "OPENAI_API_KEY": os.environ.get("OPENAI_API_KEY", ""),
              "BACKEND_ADMIN_TOKEN": os.environ.get("ADMIN_TOKEN", ""),
              "ALLOW_DEBUG_ADMIN_WITHOUT_TOKEN": "1",
              "PUBLIC_BASE_URL": "http://franksplex.com:5214",
          }

          template_path = Path("backend/phillipsburg-radio.env.template")
          output_path = Path("build/pi-image/config/phillipsburg-radio.env")
          lines = []
          for raw_line in template_path.read_text(encoding="utf-8").splitlines():
              key = raw_line.split("=", 1)[0] if "=" in raw_line and not raw_line.startswith("#") else ""
              if key in replacements:
                  lines.append(f"{key}={replacements[key]}")
              else:
                  lines.append(raw_line)
          output_path.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

          echo "Prepared backend config for feed 45951 on Pi port 80 with public URL http://franksplex.com:5214."

      - name: Install backend into Raspberry Pi image
        run: |
          set -euo pipefail

          IMG="build/pi-image/raspios-lite-arm64.img"
          ROOT_MOUNT="build/pi-image/rootfs"
          BOOT_MOUNT="build/pi-image/bootfs"
          LOOP_DEVICE=""

          cleanup() {
            set +e
            if mountpoint -q "${BOOT_MOUNT}"; then
              sudo umount "${BOOT_MOUNT}"
            fi
            if mountpoint -q "${ROOT_MOUNT}"; then
              sudo umount "${ROOT_MOUNT}"
            fi
            if [ -n "${LOOP_DEVICE}" ]; then
              sudo losetup -d "${LOOP_DEVICE}" || true
            fi
          }
          trap cleanup EXIT

          mkdir -p "${ROOT_MOUNT}" "${BOOT_MOUNT}"

          LOOP_DEVICE="$(sudo losetup --find --show --partscan "${IMG}")"
          sleep 2

          if [ ! -b "${LOOP_DEVICE}p1" ] || [ ! -b "${LOOP_DEVICE}p2" ]; then
            sudo partprobe "${LOOP_DEVICE}"
            sleep 2
          fi

          sudo mount "${LOOP_DEVICE}p2" "${ROOT_MOUNT}"
          sudo mount "${LOOP_DEVICE}p1" "${BOOT_MOUNT}"

          sudo install -d "${ROOT_MOUNT}/opt/phillipsburg-radio/backend"
          sudo install -d "${ROOT_MOUNT}/etc/phillipsburg-radio"
          sudo install -d "${ROOT_MOUNT}/etc/systemd/system"
          sudo install -d "${ROOT_MOUNT}/var/lib/phillipsburg-radio"

          sudo install -m 0755 backend/broadcastify_api_backend.py \
            "${ROOT_MOUNT}/opt/phillipsburg-radio/backend/broadcastify_api_backend.py"
          sudo install -m 0755 backend/phillipsburg_radio_server.py \
            "${ROOT_MOUNT}/opt/phillipsburg-radio/backend/phillipsburg_radio_server.py"
          sudo install -m 0755 backend/radioreference_api.py \
            "${ROOT_MOUNT}/opt/phillipsburg-radio/backend/radioreference_api.py"
          sudo install -m 0755 backend/transcript_pipeline.py \
            "${ROOT_MOUNT}/opt/phillipsburg-radio/backend/transcript_pipeline.py"

          sudo install -m 0644 backend/systemd/phillipsburg-radio-backend.service \
            "${ROOT_MOUNT}/etc/systemd/system/phillipsburg-radio-backend.service"
          sudo install -m 0644 backend/systemd/phillipsburg-radio-backend.timer \
            "${ROOT_MOUNT}/etc/systemd/system/phillipsburg-radio-backend.timer"
          sudo install -m 0644 backend/systemd/phillipsburg-radio-server.service \
            "${ROOT_MOUNT}/etc/systemd/system/phillipsburg-radio-server.service"
          sudo install -m 0644 backend/systemd/phillipsburg-radio-transcripts.service \
            "${ROOT_MOUNT}/etc/systemd/system/phillipsburg-radio-transcripts.service"

          sudo install -m 0600 build/pi-image/config/phillipsburg-radio.env \
            "${ROOT_MOUNT}/etc/phillipsburg-radio/backend.env"
          sudo install -m 0644 build/pi-image/config/phillipsburg-radio.env \
            "${BOOT_MOUNT}/phillipsburg-radio.env"

          sudo mkdir -p "${ROOT_MOUNT}/etc/systemd/system/multi-user.target.wants"
          sudo mkdir -p "${ROOT_MOUNT}/etc/systemd/system/timers.target.wants"
          sudo ln -sf /etc/systemd/system/phillipsburg-radio-server.service \
            "${ROOT_MOUNT}/etc/systemd/system/multi-user.target.wants/phillipsburg-radio-server.service"
          sudo ln -sf /etc/systemd/system/phillipsburg-radio-transcripts.service \
            "${ROOT_MOUNT}/etc/systemd/system/multi-user.target.wants/phillipsburg-radio-transcripts.service"
          sudo ln -sf /etc/systemd/system/phillipsburg-radio-backend.timer \
            "${ROOT_MOUNT}/etc/systemd/system/timers.target.wants/phillipsburg-radio-backend.timer"

          if [ -e "${ROOT_MOUNT}/lib/systemd/system/ssh.service" ]; then
            sudo ln -sf /lib/systemd/system/ssh.service \
              "${ROOT_MOUNT}/etc/systemd/system/multi-user.target.wants/ssh.service"
          fi
          sudo touch "${BOOT_MOUNT}/ssh"

          echo "Phillipsburg Radio backend installed $(date -u +%Y-%m-%dT%H:%M:%SZ)" | \
            sudo tee "${ROOT_MOUNT}/opt/phillipsburg-radio/IMAGE_BUILD.txt" >/dev/null

          sync

      - name: Verify customized image
        run: |
          set -euo pipefail

          IMG="build/pi-image/raspios-lite-arm64.img"
          ROOT_MOUNT="build/pi-image/verify-rootfs"
          BOOT_MOUNT="build/pi-image/verify-bootfs"
          LOOP_DEVICE=""

          cleanup() {
            set +e
            if mountpoint -q "${BOOT_MOUNT}"; then
              sudo umount "${BOOT_MOUNT}"
            fi
            if mountpoint -q "${ROOT_MOUNT}"; then
              sudo umount "${ROOT_MOUNT}"
            fi
            if [ -n "${LOOP_DEVICE}" ]; then
              sudo losetup -d "${LOOP_DEVICE}" || true
            fi
          }
          trap cleanup EXIT

          mkdir -p "${ROOT_MOUNT}" "${BOOT_MOUNT}"
          LOOP_DEVICE="$(sudo losetup --find --show --partscan "${IMG}")"
          sleep 2
          sudo mount "${LOOP_DEVICE}p2" "${ROOT_MOUNT}"
          sudo mount "${LOOP_DEVICE}p1" "${BOOT_MOUNT}"

          test -f "${ROOT_MOUNT}/opt/phillipsburg-radio/backend/broadcastify_api_backend.py"
          test -f "${ROOT_MOUNT}/opt/phillipsburg-radio/backend/phillipsburg_radio_server.py"
          test -f "${ROOT_MOUNT}/opt/phillipsburg-radio/backend/radioreference_api.py"
          test -f "${ROOT_MOUNT}/opt/phillipsburg-radio/backend/transcript_pipeline.py"
          test -f "${ROOT_MOUNT}/etc/systemd/system/phillipsburg-radio-server.service"
          test -f "${ROOT_MOUNT}/etc/systemd/system/phillipsburg-radio-transcripts.service"
          test -L "${ROOT_MOUNT}/etc/systemd/system/multi-user.target.wants/phillipsburg-radio-server.service"
          test -L "${ROOT_MOUNT}/etc/systemd/system/multi-user.target.wants/phillipsburg-radio-transcripts.service"
          test -L "${ROOT_MOUNT}/etc/systemd/system/timers.target.wants/phillipsburg-radio-backend.timer"
          test -f "${BOOT_MOUNT}/phillipsburg-radio.env"

          if sudo grep -q "BROADCASTIFY_API_KEY=$" "${BOOT_MOUNT}/phillipsburg-radio.env"; then
            echo "Broadcastify API key was not written into image config."
            exit 1
          fi

          if ! sudo grep -q "ALLOW_DEBUG_ADMIN_WITHOUT_TOKEN=1" "${BOOT_MOUNT}/phillipsburg-radio.env"; then
            echo "Personal debug admin mode was not written into image config."
            exit 1
          fi

          echo "Image customization verified."

      - name: Compress customized image
        run: |
          set -euo pipefail
          mkdir -p build/pi-image/deploy
          xz -T0 -6 -c build/pi-image/raspios-lite-arm64.img \
            > build/pi-image/deploy/phillipsburg-radio-backend-pi.img.xz
          file build/pi-image/deploy/phillipsburg-radio-backend-pi.img.xz
          ls -lh build/pi-image/deploy

      - name: Upload Raspberry Pi image artifact
        uses: actions/upload-artifact@v4
        with:
          name: phillipsburg-radio-backend-pi-image
          path: build/pi-image/deploy/phillipsburg-radio-backend-pi.img.xz
          if-no-files-found: error
