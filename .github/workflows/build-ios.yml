name: Build unsigned iOS IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    name: Build unsigned IPA
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: |
          xcodebuild -version
          xcodebuild -showsdks

      - name: Clean build folder
        run: |
          rm -rf build
          mkdir -p build/Payload

      - name: Build app for iPhoneOS unsigned
        run: |
          xcodebuild \
            -project PhillipsburgRadio.xcodeproj \
            -scheme PhillipsburgRadio \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package unsigned IPA
        run: |
          APP_PATH=$(find build/DerivedData/Build/Products/Release-iphoneos -name "*.app" -type d | head -n 1)

          if [ -z "$APP_PATH" ]; then
            echo "No .app found"
            exit 1
          fi

          echo "Found app at: $APP_PATH"
          cp -R "$APP_PATH" build/Payload/
          cd build
          zip -r PhillipsburgRadio-unsigned.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: PhillipsburgRadio-unsigned-ipa
          path: build/PhillipsburgRadio-unsigned.ipa
