name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/build-android.yml"
      - "android/**"

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Build APK
        env:
          APP_FEED_CONFIG_URL: ${{ secrets.APP_FEED_CONFIG_URL }}
          PUBLIC_BASE_URL: ${{ secrets.PUBLIC_BASE_URL }}
        run: |
          set -euo pipefail
          if [ -z "${APP_FEED_CONFIG_URL:-}" ]; then
            if [ -n "${PUBLIC_BASE_URL:-}" ]; then
              APP_FEED_CONFIG_URL="${PUBLIC_BASE_URL%/}/current-feed.json"
            else
              APP_FEED_CONFIG_URL="http://example.invalid/current-feed.json"
              echo "APP_FEED_CONFIG_URL/PUBLIC_BASE_URL secrets are not set; building APK with placeholder endpoint."
            fi
          fi
          export APP_FEED_CONFIG_URL
          gradle -p android :app:assembleDebug :app:assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AI-Police-Scanner-apk
          path: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/apk/release/app-release-unsigned.apk
          if-no-files-found: error
